name: Deploy to Server

on:
  push:
    branches: [ master ] # 메인 브랜치에 푸시할 때만 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Go 설치
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: 빌드 (ARM64용)
        run: |
          # GOOS=linux GOARCH=arm64 go build -ldflags "-X main.MongoURI=${{ secrets.MONGODB_URI }} -X main.PostgresURI=${{ secrets.SUPABASE_URI }}" -o server main.go
          GOOS=linux GOARCH=arm64 go build -o test-server main.go

      - name: 서버로 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "test-server"
          target: "/home/ubuntu/practice/binaryFiles/test/"

      - name: 실행
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /home/ubuntu/practice/binaryFiles/test/start.sh
            # cd /home/ubuntu/practice/binaryFiles/test
            # APP_NAME="test-server"
